<div class="login-container">
  <div class="login-card">
    <h1> 14-Track</h1>
    <p class="subtitle">Ingrese sus credenciales para reportar exploradores</p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" [(ngModel)]="correo" name="correo" required placeholder="comandante@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="contrasena" name="contrasena" required placeholder="••••••••">
      </div>

      <div *ngIf="errorMensaje" class="error-box">
        {{ errorMensaje }}
      </div>

      <button type="submit" class="btn-login">Ingresar al Sistema</button>
    </form>
  </div>
</div>
