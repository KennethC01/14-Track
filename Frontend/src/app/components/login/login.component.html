<div class="login-container">
  <div class="login-card">
    <h2>{{ isLoginMode ? 'Login' : 'Creando Cuenta' }}</h2>
    <p class="subtitle">
      {{ isLoginMode ? 'Ingrese sus credenciales de comandante' : 'Regístrese para Tener su Usuario' }}
    </p>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input type="email" id="email" [(ngModel)]="correo" name="correo" required placeholder="comandante@correo.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="contrasena" name="contrasena" required placeholder="••••••••">
      </div>

      @if (!isLoginMode) {
        <div class="form-group">
          <label>Selecciona tu Grupo</label>
          <div class="grupo-selector">
            <div class="grupo-item" 
                 [class.selected]="grupo === 'NAVEGANTES'" 
                 (click)="grupo = 'NAVEGANTES'">
              <img src="/icons/navegantes.png" alt="Navegantes">
              <span>Navegantes</span>
            </div>

            <div class="grupo-item" 
                 [class.selected]="grupo === 'PIONEROS'" 
                 (click)="grupo = 'PIONEROS'">
              <img src="/icons/pioneros.png" alt="Pioneros">
              <span>Pioneros</span>
            </div>

            <div class="grupo-item" 
                 [class.selected]="grupo === 'SEGUIDORES'" 
                 (click)="grupo = 'SEGUIDORES'">
              <img src="/icons/seguidores.png" alt="Seguidores">
              <span>Seguidores</span>
            </div>

            <div class="grupo-item" 
                 [class.selected]="grupo === 'EXPLORADORES'" 
                 (click)="grupo = 'EXPLORADORES'">
              <img src="/icons/exploradores.png" alt="Exploradores">
              <span>Exploradores</span>
            </div>
          </div>
        </div>
      }

     @if (errorMensaje) {
  <div class="error-alert error-box">
    <span class="error-icon">⚠️</span>
    <p>{{ errorMensaje }}</p>
  </div>
}

      <button type="submit" class="btn-submit">
        {{ isLoginMode ? 'Iniciar Sesión' : 'Crear Cuenta' }}
      </button>

      <div class="divider">ó</div>

      <button type="button" class="btn-toggle" (click)="toggleMode()">
        {{ isLoginMode ? '¿No tiene usuario? Regístrese aquí' : '¿Ya tiene cuenta? Inicie Sesión' }}
      </button>
    </form>
  </div>
</div>
