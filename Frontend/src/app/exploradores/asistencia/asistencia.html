<div class="asistencia-container">
  <div class="header-actions">
    <button class="btn-back" routerLink="/dashboard">⬅️ Volver al Panel</button>
  </div>

  <div class="asistencia-card">
    <div class="asistencia-header">
      <h2>🗺️ Registro de Asistencia - Exploradores</h2>
      <p>Selecciona la fecha y marca la asistencia de los muchachos para la reunión semanal.</p>
    </div>

    <div class="asistencia-filters">
      <div class="filter-group">
        <label for="fecha">Fecha de la Reunión:</label>
        <input type="date" id="fecha" class="input-date">
      </div>
      <button class="btn-guardar">💾 Guardar Asistencia</button>
    </div>

    <div class="table-responsive">
      <table class="asistencia-table">
        <thead>
          <tr>
            <th>Explorador</th>
            <th>Asistencia</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="user-cell">
             <img src="boys/kenneth.jpg" alt="Kenneth Caballero" class="avatar-img">
              <div>
                <p class="name">Kenneth Caballero</p>
                <p class="role">Patrulla Águilas</p>
              </div>
            </td>
            <td>
              <label class="switch">
                <input type="checkbox" checked>
                <span class="slider round"></span>
              </label>
            </td>
          </tr>
          <tr>
            <td class="user-cell">
              <span class="avatar">👦</span>
              <div>
                <p class="name">Carlos Mendoza</p>
                <p class="role">Patrulla Águilas</p>
              </div>
            </td>
            <td>
              <label class="switch">
                <input type="checkbox">
                <span class="slider round"></span>
              </label>
            </td>
          </tr>
          <tr>
            <td class="user-cell">
              <span class="avatar">👦</span>
              <div>
                <p class="name">Juan Pérez</p>
                <p class="role">Patrulla Lobos</p>
              </div>
            </td>
            <td>
              <label class="switch">
                <input type="checkbox" checked>
                <span class="slider round"></span>
              </label>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
