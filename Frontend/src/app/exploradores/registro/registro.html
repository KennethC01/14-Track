<div class="registro-container">
  <div class="header-actions">
    <button class="btn-back" routerLink="/dashboard">⬅️ Volver al Panel</button>
  </div>

  <div class="registro-card">
    <div class="registro-header">
      <h2>Ingreso de Muchachos</h2>
      <p>Completa la ficha detallada para registrar o actualizar un muchacho en el sistema 14-TRACK.</p>
    </div>

    <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
      
      <div class="form-group">
        <label>Nombre Completo del Muchacho:</label>
        <input type="text" [(ngModel)]="nuevoNombre" placeholder="Ej. Kenneth Caballero" class="form-input">
      </div>

      <div class="form-group">
        <label>Número de Identidad:</label>
        <input type="text" [(ngModel)]="nuevaIdentidad" placeholder="Ej. 0801-XXXX-XXXXX" class="form-input">
      </div>

      <div class="form-group">
        <label>Número de Teléfono del Muchacho:</label>
        <input type="tel" [(ngModel)]="nuevoTelefono" placeholder="Ej. +504 XXXX-XXXX" class="form-input">
      </div>

      <div class="form-group">
        <label>Tipo de Sangre:</label>
        <select [(ngModel)]="nuevoTipoSangre" class="form-input">
          <option value="O+">O+</option> <option value="O-">O-</option>
          <option value="A+">A+</option> <option value="A-">A-</option>
          <option value="B+">B+</option> <option value="B-">B-</option>
          <option value="AB+">AB+</option> <option value="AB-">AB-</option>
        </select>
      </div>

      <div class="form-group">
        <label>Nombre de los Padres / Encargado:</label>
        <input type="text" [(ngModel)]="nuevoNombrePadres" placeholder="Ej. Juan Pérez" class="form-input">
      </div>

      <div class="form-group">
        <label>Teléfono de Padres / Encargado:</label>
        <input type="tel" [(ngModel)]="nuevoTelefonoPadres" placeholder="Ej. +504 XXXX-XXXX" class="form-input">
      </div>

      <div class="form-group">
        <label>Grupo (Asignado):</label>
        <select [(ngModel)]="nuevoGrupo" class="form-input" disabled>
          <option value="NAVEGANTES">Navegantes</option>
          <option value="PIONEROS">Pioneros</option>
          <option value="EXPLORADORES">Exploradores</option>
          <option value="SEGUIDORES">Seguidores</option>
        </select>
      </div>

      <div class="form-group">
        <label>¿Está Inscrito?:</label>
        <select [(ngModel)]="nuevoInscrito" class="form-input">
          <option [ngValue]="true">Sí, está inscrito</option>
          <option [ngValue]="false">No, está pendiente</option>
        </select>
      </div>

      <div class="form-group">
        <label>Patrulla / cargo:</label>
        <select [(ngModel)]="nuevaPatrulla" class="form-input">
          <option value="ÁGUILAS">Águilas</option>
          <option value="LOBOS">Lobos</option>
          <option value="JAGUARES">Jaguares</option>
          <option value="GUIA MAYOR">Guia Mayor</option>
          <option value="GUIA MAYOR AUXILIAR">Guia Mayor Auxiliar</option>
          <option value="Lider Juvenil">Lider Juvenil</option>
          <option value="CAPELLAN AUXILIAR">Capellan Auxiliar</option>        
          <option value="Especialista en Comunicaciones">Especialista en Comunicaciones</option>
          <option value="Guia De Patrulla">Guia De Patrulla</option>
          <option value="SIN PATRULLA">Sin Patrulla (General)</option>
        </select>
      </div>

      <div class="form-group btn-container" style="grid-column: span 2;">
        <button class="btn-submit" (click)="registrarMuchacho()">💾 {{ textoBoton }}</button>
      </div>
    </div>
  </div>

  </div>
