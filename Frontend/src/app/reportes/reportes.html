<div class="report-container">
  <button routerLink="/dashboard" class="btn-volver">⬅ Volver</button>
  
  <h2>📊 Dashboard: {{ grupoActual | titlecase }}</h2>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Muchachos</h3>
      <p>{{ totalMuchachos }}</p>
    </div>
    <div class="stat-card">
      <h3>Inscritos</h3>
      <p style="color: #28a745;">{{ inscritos }}</p>
    </div>
    <div class="stat-card">
      <h3>Pendientes</h3>
      <p style="color: #dc3545;">{{ pendientes }}</p>
    </div>
  </div>

  <div class="progress-container">
    <h3>Progreso de Inscripción General</h3>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" [style.width.%]="porcentajeInscripcion"></div>
    </div>
    <p>{{ porcentajeInscripcion | number:'1.0-0' }}% de los muchachos están inscritos.</p>
  </div>
</div>
